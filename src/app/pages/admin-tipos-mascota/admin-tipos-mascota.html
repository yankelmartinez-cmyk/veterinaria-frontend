<div class="container py-4">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">🐾 Gestión de Tipos de Mascota</h2>
    <button class="btn btn-primary" (click)="abrirModalAgregar()">
      + Agregar Tipo de Mascota
    </button>
  </div>

  <div class="card">
    <div class="card-header">
      Tipos de Mascota Registrados
    </div>
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Estado</th>
            <th>Fecha de Creación</th>
            <th class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let tipo of tiposMascota">
            <td>{{ tipo.id }}</td>
            <td>{{ tipo.nombre }}</td>
            <td>{{ tipo.descripcion || '—' }}</td>
            <td>
              <span [class]="tipo.activo ? 'badge-activo' : 'badge-inactivo'">
                {{ tipo.activo ? 'Activo' : 'Inactivo' }}
              </span>
            </td>
            <td>{{ formatearFecha(tipo.fechaCreacion) }}</td>
            <td class="text-center">
              <div class="d-flex gap-2 justify-content-center">
                <button class="btn btn-warning btn-sm" (click)="abrirModalEditar(tipo)">
                  Editar
                </button>
                <button class="btn btn-danger btn-sm" (click)="eliminarTipoMascota(tipo.id)">
                  Eliminar
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<div class="modal fade" id="modalTiposMascota" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ accionModal }} Tipo de Mascota</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div class="row g-3">

          <div class="col-12">
            <label class="form-label">Nombre *</label>
            <input
              type="text"
              class="form-control"
              placeholder="Ej: Perro, Gato, Ave..."
              [(ngModel)]="nombre">
          </div>

          <div class="col-12">
            <label class="form-label">Descripción <span class="text-muted">(opcional)</span></label>
            <textarea
              class="form-control"
              rows="3"
              placeholder="Descripción del tipo de mascota..."
              [(ngModel)]="descripcion"></textarea>
          </div>

        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          Cerrar
        </button>
        <button type="button" class="btn btn-primary" (click)="guardarTipoMascota()">
          {{ accionModal }}
        </button>
      </div>
    </div>
  </div>
</div>
